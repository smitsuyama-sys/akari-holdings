<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="握手・信頼のイメージ">
  <defs>
    <linearGradient id="hsg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#e6c878"/><stop offset="1" stop-color="#b8923f"/>
    </linearGradient>
  </defs>
  <!-- forearms forming a clasped handshake (∧) -->
  <g fill="none" stroke="url(#hsg)" stroke-width="24" stroke-linecap="round">
    <path d="M34 192 L116 112"/>
    <path d="M206 192 L124 112"/>
  </g>
  <!-- clasped hands -->
  <circle cx="120" cy="108" r="30" fill="url(#hsg)"/>
  <!-- thumb -->
  <path d="M120 82 q22 -8 30 8 q4 12 -10 17 q-12 4 -20 -4 Z" fill="url(#hsg)"/>
  <!-- finger ridges -->
  <g stroke="#01091e" stroke-width="5" stroke-linecap="round" opacity=".24">
    <path d="M104 100 l11 15"/>
    <path d="M113 93 l12 16"/>
    <path d="M124 91 l12 15"/>
    <path d="M135 96 l10 14"/>
  </g>
</svg>
